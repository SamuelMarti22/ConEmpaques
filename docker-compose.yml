services:
  mysql:
    image: mysql:8.0
    container_name: mysql_prisma
    restart: always
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: conempaques
      MYSQL_USER: prisma
      MYSQL_PASSWORD: prisma123
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  mongodb:
    image: mongo:7
    container_name: mongo_db_conempaques
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: mongo123
    volumes:
      - mongo_data:/data/db

volumes:
  mysql_data:
  mongo_data: